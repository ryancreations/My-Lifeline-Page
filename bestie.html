<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Bestie • My Lifeline</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>


:root{

--primary:#00bcd4;
--accent:#ff9ff3;

--background:
linear-gradient(135deg,#fff8f0,#e0f7ff);

--card:#ffffff;

--text:#2c3e50;

--shadow:rgba(0,0,0,.12);

}



[data-theme="dark"]{

--background:
linear-gradient(135deg,#0f1c2e,#2c1e3a);

--card:#2c3e50;

--text:#e0f2f1;

--primary:#4fc3f7;

--accent:#ff79c6;

--shadow:rgba(0,0,0,.45);

}




*{

margin:0;
padding:0;
box-sizing:border-box;

}




body{

font-family:'Quicksand',sans-serif;

background:var(--background);

color:var(--text);

min-height:100vh;

transition:.5s;

}





/* NAV */


nav{

position:fixed;

top:0;

left:0;

right:0;

background:rgba(135,206,235,.97);

padding:14px 20px;

display:flex;

justify-content:center;

gap:12px;

flex-wrap:wrap;

z-index:1000;

box-shadow:
0 6px 20px var(--shadow);

}



[data-theme="dark"] nav{

background:rgba(26,38,57,.97);

}





.nav-btn{

background:white;

color:var(--primary);

border:none;

padding:10px 18px;

border-radius:30px;

font-weight:700;

cursor:pointer;

transition:.3s;

}



.nav-btn:hover{

transform:translateY(-3px);

}







/* MAIN */


main{

max-width:900px;

margin:100px auto 50px;

padding:0 20px;

}





header{

background:
linear-gradient(
135deg,
var(--primary),
#81d4fa
);

color:white;

padding:55px 30px;

border-radius:28px;

text-align:center;

box-shadow:
0 15px 40px var(--shadow);

}



header h1{

font-size:2.6rem;

margin-bottom:10px;

}





.card{

background:var(--card);

padding:30px;

border-radius:25px;

margin-top:25px;

box-shadow:
0 10px 30px var(--shadow);

text-align:center;

}








/* LOGIN */


#loginScreen{

position:fixed;

inset:0;

background:var(--background);

z-index:99999;

}



.login-box{

position:absolute;

top:50%;

left:50%;

transform:translate(-50%,-50%);

background:var(--card);

width:90%;

max-width:420px;

padding:40px 30px;

border-radius:25px;

text-align:center;

box-shadow:
0 20px 50px var(--shadow);

}



.login-box h1{

font-size:3rem;

color:var(--primary);

}



.login-box input{

width:100%;

padding:15px;

margin:10px 0;

border-radius:12px;

border:2px solid #87ceeb;

font-size:1rem;

}



.main-btn{

background:var(--primary);

color:white;

border:none;

padding:14px 30px;

border-radius:50px;

font-weight:700;

cursor:pointer;

margin:10px;

}



.hidden{

display:none;

}</style>

</head>


<body data-theme="light">





<!-- NAV -->


<nav>


<button class="nav-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>



<button class="nav-btn"
onclick="location.href='virtualpet.html'">

🐶 Pet

</button>



<button class="nav-btn"
onclick="location.href='letters.html'">

💌 Letters

</button>



<button class="nav-btn"
onclick="toggleDarkMode()">

🌗 Theme

</button>



</nav>









<!-- LOGIN -->


<div id="loginScreen">


<div class="login-box">


<h1>
🫂 AI Bestie
</h1>


<p>
Your private comfort space
</p>



<input
id="username"
placeholder="Username">



<input
id="password"
type="password"
placeholder="Password">



<button class="main-btn"
onclick="checkLogin()">

Enter Bestie Room

</button>



</div>


</div>









<!-- MAIN -->


<div id="mainContent" class="hidden">


<main>





<header>


<h1>
🫂 Talking With Bestie
</h1>


<p>
A place to write, reflect, and feel heard.
</p>


</header>









<section class="card">


<h2 style="color:var(--primary);">

😊 How are you feeling?

</h2>




<button class="main-btn"
onclick="setMood('happy')">

😊 Good

</button>



<button class="main-btn"
onclick="setMood('sad')">

😢 Sad

</button>



<button class="main-btn"
onclick="setMood('angry')">

😡 Angry

</button>



<button class="main-btn"
onclick="setMood('overwhelmed')">

😰 Overwhelmed

</button>



<p id="moodText"
style="
margin-top:20px;
font-weight:700;
">

No mood selected yet.

</p>



</section>









<section class="card">


<h2 style="color:var(--primary);">

💬 Bestie Chat

</h2>



<div id="chatBox"
style="
height:300px;
overflow-y:auto;
background:rgba(135,206,235,.15);
padding:20px;
border-radius:20px;
text-align:left;
">

<div style="
background:var(--card);
padding:15px;
border-radius:18px;
margin-bottom:10px;
">

🫂 Hey, I’m here with you. What’s on your mind?

</div>


</div>







<input
id="userMessage"
placeholder="Write something..."
style="
width:100%;
padding:15px;
margin-top:15px;
border-radius:15px;
border:2px solid #87ceeb;
font-family:inherit;
">



<button class="main-btn"
onclick="sendMessage()">

💙 Send

</button>



<button class="main-btn"
onclick="clearChat()">

🧹 Clear

</button>



</section>









<section class="card">


<h2 style="color:var(--primary);">

💙 Comfort Buttons

</h2>




<button class="main-btn"
onclick="comfort('breathe')">

😮‍💨 Breathe

</button>




<button class="main-btn"
onclick="comfort('remember')">

🌱 Remember Your Strength

</button>




<button class="main-btn"
onclick="comfort('music')">

🎵 Music Time

</button>




<p id="comfortText"
style="
margin-top:20px;
font-weight:600;
">

Choose something you need.

</p>



</section>






</main>


</div>
