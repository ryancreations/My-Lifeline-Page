/* ===============================
   MY LIFELINE THEME ENGINE
================================ */

:root{

--primary:#00bcd4;
--accent:#ff9ff3;

--background:
linear-gradient(135deg,#fff8f0,#e0f7ff);

--card:#ffffff;

--text:#2c3e50;

--shadow:
rgba(0,0,0,.12);

--bestie:
#ff9ff3;

--user:
#87ceeb;

}


[data-theme="dark"]{

--primary:#4fc3f7;

--accent:#ff79c6;

--background:
linear-gradient(135deg,#0f1c2e,#2c1e3a);

--card:#2c3e50;

--text:#e0f2f1;

--shadow:
rgba(0,0,0,.45);

--bestie:#9b59b6;

--user:#2980b9;

}



/* RESET */

*{

margin:0;
padding:0;
box-sizing:border-box;

}


body{

font-family:
'Quicksand',
sans-serif;

background:
var(--background);

color:
var(--text);

min-height:100vh;

transition:.5s;

}




/* ===============================
NAVIGATION
================================ */


nav{

position:fixed;

top:0;
left:0;
right:0;

height:70px;

background:
rgba(135,206,235,.95);

display:flex;

align-items:center;

justify-content:space-between;

padding:10px 20px;

z-index:1000;

box-shadow:
0 6px 20px var(--shadow);

}


[data-theme="dark"] nav{

background:
rgba(26,38,57,.95);

}



.logo{

font-size:1.5rem;

font-weight:700;

}



.nav-buttons{

display:flex;

gap:10px;

}



.nav-btn{

background:white;

color:var(--primary);

border:none;

padding:10px 18px;

border-radius:30px;

font-weight:700;

cursor:pointer;

}





/* ===============================
MAIN
================================ */


main{

max-width:1000px;

margin:auto;

padding:
100px 20px 40px;

}




.hero{

background:
linear-gradient(
135deg,
var(--primary),
#81d4fa
);

color:white;

padding:45px 25px;

border-radius:30px;

text-align:center;

box-shadow:
0 15px 40px var(--shadow);

}


.hero h1{

font-size:3rem;

}



.hero p{

margin-top:10px;

font-size:1.2rem;

}





/* ===============================
MODE BUTTONS
================================ */


.modes{

margin-top:25px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(150px,1fr));

gap:15px;

}



.mode-btn{

background:
var(--card);

color:
var(--text);

border:none;

padding:18px;

border-radius:20px;

cursor:pointer;

font-size:1rem;

font-weight:700;

box-shadow:
0 8px 25px var(--shadow);

transition:.3s;

}



.mode-btn:hover{

transform:
translateY(-5px);

}





/* ===============================
CHAT WINDOW
================================ */


.chat-container{

margin-top:25px;

background:
var(--card);

border-radius:30px;

padding:25px;

box-shadow:
0 10px 35px var(--shadow);

}



.chat-box{

height:500px;

overflow-y:auto;

padding:15px;

}



.message{

max-width:85%;

padding:16px 20px;

border-radius:25px;

margin:15px 0;

line-height:1.6;

animation:
fade .3s ease;

}



@keyframes fade{

from{

opacity:0;

transform:
translateY(10px);

}

to{

opacity:1;

}

}



.bestie-message{

background:
var(--bestie);

color:white;

}


.user-message{

background:
var(--user);

color:white;

margin-left:auto;

}




/* ===============================
INPUT AREA
================================ */


.input-area{

display:flex;

gap:10px;

margin-top:15px;

}



#userInput{

flex:1;

padding:16px;

border-radius:30px;

border:

color:
var(--text);

}



.send-btn{

background:
var(--primary);

border:none;

border-radius:30px;

}






/* ===============================
MEMORY CARD
================================ */


.memory-card{

background:
var(--card);

padding:25px;

border-radius:25px;

box-shadow:

var(--primary);

/* MOBILE */

@media(max-width:700px){

.hero h1{

font-size:2.2rem;

}


nav{

height:auto;

flex-wrap:wrap;

}


.chat-box{

height:420px;

}


.input-area{

flex-direction:column;

}

</main><script>

/* =====================================
        BESTIE BRAIN CORE
===================================== */


/* ===============================
THEME
================================ */


function toggleTheme(){

let current =
document.body.dataset.theme;


let next =
current === "dark"
?
"light"
:
"dark";


document.body.dataset.theme =
next;


localStorage.setItem(
"lifeline-theme",
next
);


}


if(
localStorage.getItem("lifeline-theme")
){

document.body.dataset.theme =
localStorage.getItem("lifeline-theme");

}






/* ===============================
MEMORY SYSTEM
================================ */


let bestieMemory =
JSON.parse(
localStorage.getItem("bestieMemory")
||
"{}"
);



if(!bestieMemory.messages){

bestieMemory.messages=0;

}



function saveMemory(){

localStorage.setItem(
"bestieMemory",
JSON.stringify(bestieMemory)
);


displayMemory();

}





function displayMemory(){


let display =
document.getElementById(
"memoryDisplay"
);



if(!display)
return;



display.innerHTML = `

Messages:
<strong>
${bestieMemory.messages}
</strong>

<br><br>


${
bestieMemory.name
?
"Name: "+bestieMemory.name
:
"No name saved yet"
}


<br><br>


${
bestieMemory.favorite
?
"Likes: "+bestieMemory.favorite
:
"Learning your favorites..."
}

`;

}


displayMemory();







/* ===============================
CURRENT MODE
================================ */


let bestieMode =
"comfort";



function setMode(mode){


bestieMode =
mode;



addBestieMessage(

"Mode changed to: "
+
mode.toUpperCase()
+
" 💙"

);


}







/* ===============================
EMOTION ENGINE
================================ */


const emotions = {


sad:[

"sad",
"depressed",
"empty",
"alone",
"lonely",
"cry",
"crying",
"hurt",
"broken",
"hopeless",
"tired"

],


angry:[

"angry",
"mad",
"annoyed",
"hate",
"frustrated",
"pissed"

],


anxious:[

"anxious",
"panic",
"stress",
"worried",
"scared",
"nervous"

],


happy:[

"happy",
"excited",
"great",
"amazing",
"awesome",
"proud"

],


love:[

"love",
"miss",
"relationship",
"boyfriend",
"girlfriend",
"breakup"

]


};





function detectEmotion(text){


text =
text.toLowerCase();



for(
let emotion in emotions
){


for(
let word of emotions[emotion]
){


if(text.includes(word)){

return emotion;

}


}


}


return "neutral";

}







/* ===============================
USER LEARNING
================================ */


function learnUser(text){


let lower =
text.toLowerCase();



if(
lower.includes("my name is")
){


bestieMemory.name =
text
.split("my name is")[1]
.trim();


}



if(
lower.includes("i like")
){


bestieMemory.favorite =
text;


}



if(
lower.includes("favorite")
){


bestieMemory.favorite =
text;


}



saveMemory();


}







/* ===============================
RESPONSE BRAIN
================================ */


function generateResponse(text){


let emotion =
detectEmotion(text);



let responses = {



sad:[

"I'm really glad you told me 💙 I'm listening.",

"That sounds like a lot to carry. Want to tell me what happened?",

"I'm here with you. You don't have to explain everything perfectly."

],



angry:[

"That sounds frustrating. What happened?",

"Okay, let's unpack this. What part bothered you the most?"

],



anxious:[

"Let's slow things down for a second 💙 What's making your mind race?",

"I'm here. We can take this one piece at a time."

],



happy:[

"AYYY that's awesome 😭🔥 Tell me more!",

"I love hearing good things. You deserve those moments."

],



love:[

"Feelings for people can run really deep. I'm listening 💙",

"That sounds like something important to you. Tell me about it."

],



neutral:[

"I'm listening 💙",

"Tell me more about that.",

"Okay, I'm here with you.",

"What happened next?"

]


};



let answer =
responses[emotion]
[
Math.floor(
Math.random()
*
responses[emotion].length
)
];






// Mode adjustments


if(bestieMode==="vent"){


answer =
"🫂 I'm listening. Get it all out. "
+
answer;


}



if(bestieMode==="hype"){


answer =
"🔥 Bestie mode activated. "
+
answer;


}



if(bestieMode==="reflect"){


answer =
"🧠 Let's think about this together. "
+
answer;


}



if(bestieMode==="chill"){


answer =
"😂 Okay bestie, "
+
answer;


}



return answer;


}








/* ===============================
MESSAGE HANDLING
================================ */


function addBestieMessage(text){


let box =
document.getElementById(
"chatBox"
);



let div =
document.createElement("div");



div.className =
"message bestie-message";



div.innerHTML =
text;



box.appendChild(div);



box.scrollTop =
box.scrollHeight;


}





function addUserMessage(text){


let box =
document.getElementById(
"chatBox"
);



let div =
document.createElement("div");



div.className =
"message user-message";



div.innerHTML =
text;



box.appendChild(div);



box.scrollTop =
box.scrollHeight;


}








function sendMessage(){


let input =
document.getElementById(
"userInput"
);



let text =
input.value.trim();



if(!text)
return;



addUserMessage(text);


input.value="";



bestieMemory.messages++;


learnUser(text);



saveMemory();




setTimeout(()=>{


let reply =
generateResponse(text);



addBestieMessage(reply);



},700);



}




</script><script>

/* =====================================
      BESTIE ADVANCED SUPPORT SYSTEM
===================================== */


/* ===============================
CONVERSATION CONTEXT
================================ */


let conversation = {

lastEmotion:"neutral",

topics:[],

venting:false,

needsSupport:false

};







/* ===============================
ADVANCED EMOTION SCAN
================================ */


function analyzeMessage(text){


let emotion =
detectEmotion(text);



conversation.lastEmotion =
emotion;



let lower =
text.toLowerCase();



// remember topics

const topicWords = [

"school",
"work",
"family",
"friend",
"relationship",
"music",
"gaming",
"sleep",
"stress",
"future",
"therapy"

];


topicWords.forEach(topic=>{


if(lower.includes(topic)
&&
!conversation.topics.includes(topic)){

conversation.topics.push(topic);

}


});



return emotion;

}








/* ===============================
VENT MODE
================================ */


function ventResponse(text){


conversation.venting=true;


let emotion =
analyzeMessage(text);



let replies = {


sad:[

"🫂 I'm right here. You can let it out.",

"That sounds really heavy. What part has been the hardest?",

"I’m listening. Take your time."

],


angry:[

"That sounds like it really got under your skin. Want to tell me what happened?",

"Yeah, I can see why that would bother you. Keep talking."

],


anxious:[

"Let's slow it down together. What is the biggest thing on your mind right now?",

"One thing at a time. I'm here with you."

],


neutral:[

"Go ahead. I'm listening.",

"You can say it exactly how you feel it.",

"Tell me what's been going on."

]


};



let list =
replies[emotion]
||
replies.neutral;



return list[
Math.floor(
Math.random()*list.length
)
];


}







/* ===============================
COMFORT MODE
================================ */


function comfortResponse(){


let comfort=[


"💙 You matter. I'm glad you decided to talk instead of holding everything inside.",


"🫂 Take this one moment at a time. You don't have to solve everything tonight.",


"🌱 Small steps still count. Getting through a hard moment is still progress.",


"💙 Be gentle with yourself. You deserve the same kindness you give others."

];


return comfort[
Math.floor(
Math.random()*comfort.length
)
];


}







/* ===============================
GROUNDING TOOLS
================================ */


const grounding=[


"Look around and name 5 things you can see.",


"Try relaxing your shoulders and taking a slow breath.",


"Grab some water if you can.",


"Change your environment for a minute — stand up, stretch, or move rooms."

];




function groundingSuggestion(){


return (

"😮‍💨 Quick reset idea:<br><br>"
+
grounding[
Math.floor(
Math.random()*grounding.length
)
]

);


}








/* ===============================
LIFELINE TOOL CONNECTIONS
================================ */


function lifelineTools(){


return `

<div style="
margin-top:15px;
padding:15px;
background:rgba(0,188,212,.15);
border-radius:18px;
">


<strong>
Want to try something?
</strong>

<br><br>


<button onclick="location.href='music.html'">
🎵 Music
</button>


<button onclick="location.href='onebreath.html'">
😮‍💨 Breathing
</button>


<button onclick="location.href='reflect.html'">
📝 Journal
</button>


<button onclick="location.href='virtualpet.html'">
🐶 Pet
</button>


</div>

`;

}







/* ===============================
SUPPORT CHECK
================================ */


function supportCheck(text){


let lower =
text.toLowerCase();



const seriousWords=[

"can't do this",
"give up",
"no point",
"want to disappear",
"hurt myself",
"end it"

];



for(
let word of seriousWords
){


if(lower.includes(word)){


conversation.needsSupport=true;



return `

🫂 I'm really glad you told me.

I'm here with you right now.

Let's focus on getting through this moment together.

<br><br>

Would you like to:
<br>
• Tell me what's happening?
<br>
• Try a calming exercise?
<br>
• Open your Lifeline support tools?

${lifelineTools()}

`;

}


}



return null;


}







/* ===============================
MASTER RESPONSE UPGRADE
================================ */


const oldGenerate =
generateResponse;



generateResponse=function(text){



let support =
supportCheck(text);



if(support){

return support;

}



if(bestieMode==="vent"){

return ventResponse(text);

}



if(bestieMode==="comfort"){

return comfortResponse()
+
"<br><br>"
+
groundingSuggestion();

}



return oldGenerate(text);


};






</script><script>

/* =====================================
      BESTIE PERSONALITY + MEMORY v2
===================================== */



/* ===============================
PERSONALITY SYSTEM
================================ */


let bestieSettings =
JSON.parse(
localStorage.getItem("bestieSettings")
||
"{}"
);



if(!bestieSettings.style){

bestieSettings.style =
"soft";

}




const personalities={


soft:{

name:"Soft Bestie",

emoji:"🫂",

tone:
"gentle and caring"

},


funny:{

name:"Funny Bestie",

emoji:"😂",

tone:
"playful and casual"

},


motivator:{

name:"Hype Bestie",

emoji:"🔥",

tone:
"energetic and encouraging"

},


calm:{

name:"Calm Bestie",

emoji:"🌙",

tone:
"peaceful and grounding"

}


};







function setPersonality(style){


bestieSettings.style =
style;



localStorage.setItem(
"bestieSettings",
JSON.stringify(bestieSettings)
);



addBestieMessage(

"✨ Bestie personality changed to "

personalities[style].name

);


}







/* ===============================
DEEP MEMORY
================================ */



function saveImportantMemory(key,value){


bestieMemory[key]=value;


saveMemory();


}





function scanForMemories(text){


let lower =
text.toLowerCase();



if(lower.includes("i love")){


saveImportantMemory(
"likes",
text
);


}



if(lower.includes("favorite")){


saveImportantMemory(
"favoriteThing",
text
);


}



if(lower.includes("i hate")){


saveImportantMemory(
"dislikes",
text
);


}



if(lower.includes("my goal")){


saveImportantMemory(
"goal",
text
);


}



}








// Upgrade learning

const oldLearnUser =
learnUser;



learnUser=function(text){


oldLearnUser(text);


scanForMemories(text);


};









/* ===============================
CHAT HISTORY
================================ */


let chatHistory =
JSON.parse(
localStorage.getItem("bestieHistory")
||
"[]"
);



function saveChat(type,text){


chatHistory.push({

type:type,

text:text,

time:
new Date()
.toLocaleTimeString()

});



if(chatHistory.length>100){

chatHistory.shift();

}



localStorage.setItem(

"bestieHistory",

JSON.stringify(chatHistory)

);


}







/* ===============================
UPGRADE MESSAGE FUNCTIONS
================================ */


const oldAddBestie =
addBestieMessage;



addBestieMessage=function(text){



showTyping();



setTimeout(()=>{


oldAddBestie(text);



saveChat(
"bestie",
text
);



},700);



};





const oldAddUser =
addUserMessage;



addUserMessage=function(text){



oldAddUser(text);



saveChat(
"user",
text
);



};








/* ===============================
TYPING ANIMATION
================================ */



function showTyping(){


let box =
document.getElementById(
"chatBox"
);



let typing =
document.createElement("div");



typing.id =
"typing";



typing.className =
"message bestie-message";



typing.innerHTML =
"Bestie is typing... 💙";



box.appendChild(typing);



box.scrollTop =
box.scrollHeight;



setTimeout(()=>{


if(typing){

typing.remove();

}


},600);


}









/* ===============================
WELCOME MEMORY
================================ */



function memoryWelcome(){



if(bestieMemory.name){


addBestieMessage(

"Welcome back "
+
bestieMemory.name
+
" 💙 I remember talking with you."

);


}


else{


addBestieMessage(

"Hey 💙 I'm still getting to know you. Tell me about yourself."

);


}



}





/* ===============================
LOAD HISTORY OPTION
================================ */



function loadOldChat(){



chatHistory.forEach(message=>{


let box =
document.getElementById(
"chatBox"
);



let div =
document.createElement("div");



div.className =
"message "
+
(
message.type==="user"
?
"user-message"
:
"bestie-message"
);



div.innerHTML =
message.text;



box.appendChild(div);


});



}






window.addEventListener(
"load",
()=>{


loadOldChat();



setTimeout(
memoryWelcome,
500
);


}
);






</script><script>

/* =====================================
        BESTIE FINAL SYSTEM
===================================== */


/* ===============================
SETTINGS PANEL
================================ */


function showSettings(){


let choice =
prompt(

"Choose Bestie style:\n\n" +

"1 = Soft 🫂\n" +

"2 = Funny 😂\n" +

"3 = Hype 🔥\n" +

"4 = Calm 🌙"

);



if(choice==="1"){

setPersonality("soft");

}


if(choice==="2"){

setPersonality("funny");

}


if(choice==="3"){

setPersonality("motivator");

}


if(choice==="4"){

setPersonality("calm");

}


}






/* ===============================
PERSONALITY RESPONSE BOOST
================================ */


function personalityBoost(){


let style =
bestieSettings.style;



if(style==="funny"){

return " 😂";

}


if(style==="motivator"){

return " 🔥 You've got this.";

}


if(style==="calm"){

return " 🌙 Let's take this slowly.";

}



return " 💙";


}







/* ===============================
FINAL RESPONSE WRAPPER
================================ */


const originalGenerate =
generateResponse;



generateResponse=function(text){


let response =
originalGenerate(text);



return response
+
personalityBoost();



};







/* ===============================
CLEAR CHAT
================================ */


function clearChat(){


if(
confirm(
"Clear Bestie's conversation history?"
)
){


localStorage.removeItem(
"bestieHistory"
);



location.reload();


}


}






/* ===============================
RESET EVERYTHING
================================ */


function resetBestie(){


if(
confirm(
"Reset Bestie's memory and settings?"
)
){


localStorage.removeItem(
"bestieMemory"
);


localStorage.removeItem(
"bestieSettings"
);


localStorage.removeItem(
"bestieHistory"
);



location.reload();


}


}








/* ===============================
QUICK ACTIONS
================================ */


function quickMessage(text){


document.getElementById(
"userInput"
).value=text;



sendMessage();


}






</script>
