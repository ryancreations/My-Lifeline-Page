<style>

/* =========================
MY LIFELINE THEME
========================= */


:root{

--primary:#00bcd4;

--accent:#ff9ff3;

--background:
linear-gradient(135deg,#fff8f0,#e0f7ff);

--card:#ffffff;

--text:#2c3e50;

--shadow:
rgba(0,0,0,.12);

}



[data-theme="dark"]{

--background:
linear-gradient(135deg,#0f1c2e,#2c1e3a);

--card:#2c3e50;

--text:#e0f2f1;

--primary:#4fc3f7;

--accent:#ff79c6;

--shadow:
rgba(0,0,0,.45);

}




*{

margin:0;

padding:0;

box-sizing:border-box;

}



body{

font-family:
'Quicksand',
sans-serif;

background:
var(--background);

color:
var(--text);

min-height:100vh;

transition:.5s;

}





/* =========================
NAVIGATION
========================= */


nav{

position:fixed;

top:0;

left:0;

right:0;

background:
rgba(135,206,235,.97);

padding:14px 20px;

display:flex;

justify-content:center;

gap:12px;

flex-wrap:wrap;

z-index:1000;

box-shadow:
0 6px 20px var(--shadow);

}



[data-theme="dark"] nav{

background:
rgba(26,38,57,.97);

}



.nav-btn{

background:white;

color:var(--primary);

border:none;

padding:10px 18px;

border-radius:30px;

font-weight:600;

cursor:pointer;

transition:.3s;

}



.nav-btn:hover{

transform:
translateY(-3px);

}






/* =========================
MAIN
========================= */


main{

max-width:900px;

margin:
100px auto 50px;

padding:
0 20px;

}





header{

background:
linear-gradient(
135deg,
var(--primary),
#81d4fa
);

color:white;

padding:
55px 30px;

border-radius:28px;

text-align:center;

box-shadow:
0 15px 40px var(--shadow);

}



header h1{

font-size:2.6rem;

margin-bottom:12px;

}






/* =========================
CARDS
========================= */


.card{

background:
var(--card);

border-radius:22px;

padding:30px;

margin-top:25px;

box-shadow:
0 10px 30px var(--shadow);

}





/* =========================
LOGIN
========================= */


#loginScreen{

position:fixed;

inset:0;

background:
var(--background);

z-index:9999;

}



.login-box{

position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

background:
var(--card);

padding:45px 30px;

width:90%;

max-width:420px;

border-radius:25px;

text-align:center;

box-shadow:
0 20px 50px var(--shadow);

}



.login-box h1{

font-size:3rem;

color:
var(--primary);

}



.login-box input{

width:100%;

padding:15px;

margin:10px 0;

border-radius:12px;

border:
2px solid #87ceeb;

font-size:1rem;

}



.main-btn{

background:
var(--primary);

color:white;

border:none;

padding:
14px 30px;

border-radius:50px;

cursor:pointer;

font-size:1.1rem;

margin-top:15px;

}



.hidden{

display:none;

}



</style>
</head>


<body data-theme="light">


<!-- NAVIGATION -->

<nav>

placeholder="Password">

Enter Safe Space

<!-- MAIN CONTENT -->


<div id="mainContent" class="hidden">


<main>



<header>

<h1>
🫂 AI Bestie
</h1>


<p>
A safe place to talk, vent, or just say what’s on your mind.
</p>


</header>






<section class="card">


<h2 style="
color:var(--primary);
text-align:center;
">

💬 Bestie Chat

</h2>



<div id="chatBox"
style="
height:420px;
overflow-y:auto;
padding:20px;
background:rgba(0,188,212,.08);
border-radius:20px;
margin-top:20px;
">

<div style="
background:var(--card);
padding:15px;
border-radius:18px;
margin-bottom:15px;
">

<b>
🫂 Bestie:
</b>

<br>

Hey 💙 I’m here with you.  
What’s going on?

</div>


</div>







<textarea
id="userMessage"
placeholder="Type something to Bestie..."
style="
width:100%;
height:120px;
margin-top:20px;
padding:18px;
border-radius:18px;
border:2px solid #87ceeb;

">

">

<section class="card">

color:var(--primary);
text-align:center;
">

</h2>

onclick="quickMessage('I need encouragement')">

onclick="quickMessage('I am overwhelmed')">

😔 I am overwhelmed

</button>



<button class="main-btn"
onclick="quickMessage('I need a distraction')">

</button>

🫂 Stay with me

</button>

</main>


</div><script>


// =========================
// THEME SYNC
// =========================


function toggleDarkMode(){


const current =
document.documentElement.getAttribute(
"data-theme"
);



const newTheme =
current==="dark"
?
"light"
:
"dark";



document.documentElement.setAttribute(
"data-theme",
newTheme
);



localStorage.setItem(
"lifeline-theme",
newTheme
);


}



if(
localStorage.getItem("lifeline-theme")
==="dark"
){

document.documentElement.setAttribute(
"data-theme",
"dark"
);

}






// =========================
// LOGIN
// =========================


function checkLogin(){


const user =
document.getElementById("username")
.value
.trim()
.toLowerCase();



const pass =
document.getElementById("password")
.value
.trim();




if(

(user==="ryan" && pass==="ITSmf420") ||

(user==="guest" && pass==="guest") ||

(user==="visitor" && pass==="welcome") ||

(user==="friend" && pass==="lifeline") ||

(user==="nc" && pass==="boone")

){



localStorage.setItem(
"lifelineAuthenticated",
"true"
);



document
.getElementById("loginScreen")
.classList.add("hidden");



document
.getElementById("mainContent")
.classList.remove("hidden");



loadChat();


}

else{


alert(
"Incorrect username or password."
);


}


}







if(

localStorage.getItem(
"lifelineAuthenticated"
)
==="true"

){


document
.getElementById("loginScreen")
.classList.add("hidden");



document
.getElementById("mainContent")
.classList.remove("hidden");



}









// =========================
// CHAT SYSTEM
// =========================



let chat =

JSON.parse(

localStorage.getItem(
"bestieChat"
)

||
"[]"

);







function saveChat(){


localStorage.setItem(

"bestieChat",

JSON.stringify(chat)

);


}









function addMessage(sender,text){


const box =
document.getElementById("chatBox");



const message =
document.createElement("div");



message.style.background=
"var(--card)";



message.style.padding=
"15px";



message.style.borderRadius=
"18px";



message.style.marginBottom=
"15px";



message.innerHTML=

`

<b>
${sender}
</b>

<br>

${text}

`;



box.appendChild(message);



box.scrollTop =
box.scrollHeight;


}









function sendMessage(){


const input =
document.getElementById(
"userMessage"
);



const text =
input.value.trim();



if(!text)
return;




addMessage(
"🙂 You:",
text
);



chat.push({

sender:"You",

text:text

});



saveChat();



input.value="";



setTimeout(()=>{


bestieReply(text);



},600);



}









function bestieReply(text){


let reply;



const lower =
text.toLowerCase();



if(
lower.includes("sad")
||
lower.includes("depressed")
){

reply=
"I’m glad you said something 💙 You don’t have to carry everything alone. I’m here with you.";

}



else if(
lower.includes("overwhelmed")
){

reply=
"Let’s take one small moment at a time. You don’t have to solve everything all at once.";

}



else if(
lower.includes("alone")
){

reply=
"You’re not alone right now. I’m listening. Tell me what’s been going on.";

}



else if(
lower.includes("distraction")
){

reply=
"Try a small reset: music, a game, a walk, or something comforting you enjoy.";

}



else{


reply=
"Thank you for telling me that 💙 I’m listening. Keep talking to me.";

}





addMessage(
"🫂 Bestie:",
reply
);



chat.push({

sender:"Bestie",

text:reply

});



saveChat();



}









function quickMessage(text){


document.getElementById(
"userMessage"
).value=text;


sendMessage();


}









function loadChat(){


const box =
document.getElementById(
"chatBox"
);



if(!box)
return;



chat.forEach(message=>{


addMessage(

message.sender==="You"
?
"🙂 You:"
:
"🫂 Bestie:",

message.text

);


});


}









function clearChat(){


if(confirm("Clear Bestie chat?")){


chat=[];


localStorage.removeItem(
"bestieChat"
);



document.getElementById(
"chatBox"
).innerHTML="";


addMessage(
"🫂 Bestie:",
"Chat cleared 💙 I’m still here whenever you want to talk."
);


}


}



</script>
