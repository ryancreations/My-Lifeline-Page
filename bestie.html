<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Bestie • My Lifeline</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(to bottom, #e0f7ff, #fff8f0);
            color: #333;
            min-height: 100vh;
        }
        nav {
            position: fixed; top: 0; width: 100%; background: #87ceeb; padding: 12px 0;
            display: flex; justify-content: center; gap: 12px; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        nav button {
            background: white; color: #00bcd4; border: none; padding: 10px 20px; border-radius: 25px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        nav button:hover { background: #00bcd4; color: white; }
        main { margin-top: 85px; max-width: 920px; margin: 85px auto 20px; padding: 20px; }
        header {
            background: #87ceeb; color: white; padding: 28px; text-align: center;
            border-radius: 20px; margin-bottom: 25px;
        }
        .chat-container {
            background: white; border-radius: 20px; height: 72vh; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden;
        }
        .messages {
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;
        }
        .message {
            max-width: 80%; padding: 14px 18px; border-radius: 18px; line-height: 1.5;
        }
        .user { align-self: flex-end; background: #00bcd4; color: white; border-bottom-right-radius: 4px; }
        .bestie { align-self: flex-start; background: #f0f8ff; color: #333; border-bottom-left-radius: 4px; display: flex; gap: 10px; }
        .bestie-avatar {
            width: 44px; height: 44px; background: #ff9ff3; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0;
        }
        .image-container img {
            max-width: 100%; border-radius: 14px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .input-area {
            padding: 18px; background: #f8f8f8; display: flex; gap: 10px; border-top: 1px solid #ddd;
        }
        .input-area input {
            flex: 1; padding: 16px 22px; border: 2px solid #87ceeb; border-radius: 30px; font-size: 1.05em; outline: none;
        }
        .input-area button {
            background: #00bcd4; color: white; border: none; width: 60px; height: 60px;
            border-radius: 50%; font-size: 1.9em; cursor: pointer;
        }
        .typing { align-self: flex-start; background: #f0f8ff; padding: 12px 20px; border-radius: 18px; font-style: italic; color: #666; }
    </style>
</head>
<body>

<nav>
    <button onclick="location.href='index.html'">← Dashboard</button>
    <button onclick="logout()" style="background:#ff6b6b;color:white;">Log Out</button>
</nav>

<main>
    <header>
        <h1>🫂 Hey Bestie!</h1>
        <p>I'm here for poems, advice, vent sessions, or to create images for you 💕</p>
    </header>

    <div class="chat-container">
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Talk to me... (e.g. write a poem about hope or draw a cozy sunset)" 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">↑</button>
        </div>
    </div>
</main>

<script>
// Your xAI API Key
const API_KEY = "xai-BpSrtirmVFb4lBtV1hGnSmupfnKi32cLxlVzJqCGT3KSOhkf7GQZPQwqhfAem0W54F9Nq5vxCy4eiChl";

const CHAT_URL = "https://api.x.ai/v1/chat/completions";
const IMAGE_URL = "https://api.x.ai/v1/images/generations";

function checkLogin() {
    if (localStorage.getItem("lifelineAuthenticated") !== "true") {
        const entered = prompt("Enter your personal key to access Bestie ❤️");
        if (entered === "ITSmf420") {
            localStorage.setItem("lifelineAuthenticated", "true");
        } else {
            alert("Incorrect key. Going back to dashboard.");
            location.href = "index.html";
        }
    }
}

function logout() {
    localStorage.removeItem("lifelineAuthenticated");
    location.href = "index.html";
}

function addMessage(content, sender, isImage = false) {
    const msgDiv = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${sender}`;

    if (sender === 'bestie') {
        div.innerHTML = `<div class="bestie-avatar">🫂</div><div>${content}</div>`;
    } else {
        div.textContent = content;
    }

    if (isImage && content.startsWith('http')) {
        div.innerHTML += `<div class="image-container"><img src="${content}" alt="Bestie created this for you"></div>`;
    }

    msgDiv.appendChild(div);
    msgDiv.scrollTop = msgDiv.scrollHeight;
}

function showTyping() {
    const msgDiv = document.getElementById('messages');
    const typing = document.createElement('div');
    typing.id = 'typing';
    typing.className = 'typing';
    typing.textContent = 'Bestie is thinking... 💭';
    msgDiv.appendChild(typing);
    msgDiv.scrollTop = msgDiv.scrollHeight;
    return typing;
}

function wantsImage(text) {
    const lower = text.toLowerCase();
    return /(draw|generate|make|create).*?(image|picture|photo|drawing|art|sticker)/.test(lower) ||
           lower.includes("draw me") || lower.includes("image of");
}

async function sendMessage() {
    const input = document.getElementById('userInput');
    const prompt = input.value.trim();
    if (!prompt) return;

    addMessage(prompt, 'user');
    input.value = '';

    const typing = showTyping();

    try {
        if (wantsImage(prompt)) {
            // Image Generation
            const res = await fetch(IMAGE_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "grok-imagine-image",
                    prompt: prompt,
                    n: 1
                })
            });

            if (!res.ok) {
                const errText = await res.text();
                console.error("Image Error:", res.status, errText);
                throw new Error("Image generation failed");
            }

            const data = await res.json();
            const imageUrl = data.data && data.data[0] ? data.data[0].url : null;

            typing.remove();

            if (imageUrl) {
                addMessage(imageUrl, 'bestie', true);
                setTimeout(() => {
                    addMessage("Here you go, love! 🥰 How does it feel? Want any changes?", 'bestie');
                }, 800);
            } else {
                addMessage("I tried to create the image but ran into a glitch 💭 Try again?", 'bestie');
            }
        } else {
            // Normal Chat
            const res = await fetch(CHAT_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "grok-4-0709",
                    messages: [
                        {
                            role: "system",
                            content: "You are Bestie, a warm, supportive, and fun AI best friend focused on mental health. Be empathetic, encouraging, and use lots of emojis. You love writing poems, giving gentle advice, and creating images when asked."
                        },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.85
                })
            });

            if (!res.ok) {
                const errText = await res.text();
                console.error("Chat Error:", res.status, errText);
                throw new Error("Chat failed");
            }

            const data = await res.json();
            const reply = data.choices[0].message.content;

            typing.remove();
            addMessage(reply, 'bestie');
        }
    } catch (err) {
        console.error("Full error:", err);
        typing.remove();
        addMessage("Sorry sweetie, Bestie hit a small snag 💭 Check the console (F12) and tell me what error you see, or try again!", 'bestie');
    }
}

// On load
window.onload = () => {
    checkLogin();
    const messagesDiv = document.getElementById('messages');
    if (messagesDiv.children.length === 0) {
        addMessage("Hi love! 🫂 I'm your AI Bestie. What's on your heart today? Want a poem, some advice, or shall I draw something beautiful for you? 💕", 'bestie');
    }
};
</script>
</body>
</html>
