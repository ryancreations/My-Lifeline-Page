<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Bestie • My Lifeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family:'Quicksand',sans-serif; background:linear-gradient(135deg,#fff8f0,#e0f7ff); margin:0; min-height:100vh; color:#333; }
    [data-theme="dark"] body { background:linear-gradient(135deg,#1a2639,#2c1e3a); color:#eee; }

    .chat-container { max-width:820px; margin:80px auto 30px; background:rgba(255,255,255,0.95); border-radius:24px; box-shadow:0 15px 50px rgba(0,0,0,0.15); height:calc(100vh - 120px); display:flex; flex-direction:column; overflow:hidden; }
    [data-theme="dark"] .chat-container { background:#2c3e50; }

    .header { background:#00bcd4; color:white; padding:20px; text-align:center; font-size:1.5rem; }
    .messages { flex:1; padding:24px; overflow-y:auto; display:flex; flex-direction:column; gap:18px; }
    .message { max-width:80%; padding:16px 22px; border-radius:22px; line-height:1.55; }
    .user { align-self:flex-end; background:#00bcd4; color:white; border-bottom-right-radius:6px; }
    .bestie { align-self:flex-start; background:#f0f0f0; color:#333; border-bottom-left-radius:6px; }
    [data-theme="dark"] .bestie { background:#34495e; color:#eee; }

    .input-area { padding:20px; background:white; border-top:1px solid #ddd; display:flex; gap:12px; }
    [data-theme="dark"] .input-area { background:#2c3e50; }
    input { flex:1; padding:16px 24px; border:2px solid #00bcd4; border-radius:999px; font-size:1.1rem; }
    button { padding:0 32px; background:#00bcd4; color:white; border:none; border-radius:999px; cursor:pointer; font-weight:600; }
  </style>
</head>
<body data-theme="light">

  <nav style="position:fixed;top:0;left:0;right:0;background:rgba(135,206,235,0.97);padding:14px 20px;z-index:1000;">
    <button onclick="location.href='index.html'" style="background:white;color:#00bcd4;border:none;padding:10px 20px;border-radius:30px;">← Dashboard</button>
  </nav>

  <div class="chat-container">
    <div class="header">🫂 Real AI Bestie</div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Tell me anything... I'm here for you 💕" onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
  const messagesEl = document.getElementById("messages");
  const userInput = document.getElementById("userInput");

  const WORKER_URL = "https://lifeline-ai.ryancroland.workers.dev/";

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = "message " + sender;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Welcome message
  addMessage(
    "Hey 💙 I’m your Lifeline AI Bestie. I’m here to listen. What’s on your mind?",
    "bestie"
  );

  async function sendMessage() {
    const message = userInput.value.trim();

    if (!message) return;

    addMessage(message, "user");
    userInput.value = "";

    const thinking = document.createElement("div");
    thinking.className = "message bestie";
    thinking.textContent = "Thinking... 💙";
    messagesEl.appendChild(thinking);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const response = await fetch(WORKER_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });

      const data = await response.json();

      thinking.remove();

      addMessage(
        data.reply || "I’m here with you 💙",
        "bestie"
      );

    } catch (error) {

      thinking.remove();

      addMessage(
        "I’m having trouble connecting right now, but I’m still here with you 💙",
        "bestie"
      );

      console.error(error);
    }
  }

  // Dark mode sync with My Lifeline
  if (localStorage.getItem("lifeline-theme") === "dark") {
    document.documentElement.setAttribute("data-theme", "dark");
  }
</script>
