<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Bestie • My Lifeline</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">


<style>

:root{

--primary:#00bcd4;
--accent:#ff9ff3;
--bg:linear-gradient(135deg,#fff8f0,#e0f7ff);
--card:white;
--text:#2c3e50;

}


[data-theme="dark"]{

--bg:linear-gradient(135deg,#0f1c2e,#2c1e3a);
--card:#2c3e50;
--text:#ecf0f1;
--primary:#4fc3f7;
--accent:#ff79c6;

}



*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

font-family:'Quicksand',sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;

}



nav{

position:fixed;
top:0;
left:0;
right:0;

padding:14px;

background:#87ceeb;

display:flex;
justify-content:center;
gap:10px;

z-index:999;

}



.nav-btn{

background:white;
color:#00bcd4;

padding:10px 20px;

border:none;
border-radius:30px;

font-weight:bold;

cursor:pointer;

}



main{

max-width:900px;

margin:auto;

padding:100px 20px;

}



header{

background:linear-gradient(
135deg,
var(--primary),
#81d4fa
);

color:white;

padding:45px;

border-radius:30px;

text-align:center;

box-shadow:0 15px 40px rgba(0,0,0,.2);

}



header h1{

font-size:2.7rem;

}



.chat-container{

background:var(--card);

margin-top:30px;

padding:25px;

border-radius:25px;

height:550px;

overflow-y:auto;

box-shadow:
0 10px 30px rgba(0,0,0,.15);

}



.message{

padding:15px 20px;

border-radius:25px;

margin:12px 0;

max-width:85%;

line-height:1.5;

}



.bestie-message{

background:#ff9ff3;

color:white;

}



.user-message{

background:#87ceeb;

color:white;

margin-left:auto;

}



.input-area{

display:flex;

gap:10px;

margin-top:20px;

}



#userInput{

flex:1;

padding:15px;

border-radius:30px;

border:

2px solid var(--primary);

font-size:1rem;

}



.send-btn{

background:var(--primary);

color:white;

border:none;

padding:15px 25px;

border-radius:30px;

cursor:pointer;

font-weight:bold;

}



.panel{

background:var(--card);

margin-top:25px;

padding:20px;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.12);

}



.panel button{

background:var(--primary);

color:white;

border:none;

padding:12px 20px;

border-radius:30px;

cursor:pointer;

}



</style>


</head>


<body data-theme="light">



<nav>

<button class="nav-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>


<button class="nav-btn"
onclick="toggleTheme()">

🌗 Theme

</button>


</nav>



<main>


<header>

<h1>
🫂 AI Bestie
</h1>

<p>
Your personal Lifeline companion
</p>

</header>



<div class="chat-container"
id="chat">


<div class="message bestie-message">

Hey 💙 I'm Bestie.

I'm here whenever you need to talk.

</div>


</div>




<div class="input-area">


<input

id="userInput"

placeholder="Talk to Bestie..."

onkeypress="if(event.key==='Enter')sendMessage()"

>


<button class="send-btn"
onclick="sendMessage()">

Send

</button>


</div>




<div class="panel">

<h3>
⚙️ Bestie Settings
</h3>

<br>


<button onclick="clearMemory()">

Clear Memory

</button>


</div>



</main>




<script src="bestie-brain.js"></script>


<script>


function sendMessage(){


let input =
document.getElementById("userInput");


let text =
input.value.trim();



if(!text)return;



addMessage(
text,
"user-message"
);



input.value="";



let reply =
bestieThink(text);



setTimeout(()=>{


addMessage(
reply,
"bestie-message"
);


},400);



}




function addMessage(text,type){


let chat =
document.getElementById("chat");


let div =
document.createElement("div");


div.className =
"message "+type;


div.innerHTML =
text;


chat.appendChild(div);


chat.scrollTop =
chat.scrollHeight;


}




function toggleTheme(){


let theme =
document.body.dataset.theme;


theme =
theme==="dark"
?
"light"
:
"dark";


document.body.dataset.theme =
theme;


localStorage.setItem(
"lifeline-theme",
theme
);


}



if(localStorage.getItem("lifeline-theme")){

document.body.dataset.theme =
localStorage.getItem("lifeline-theme");

}



function clearMemory(){

localStorage.removeItem(
"bestie-memory"
);

alert(
"Bestie's memory cleared."
);

}


</script>


</body>

</html>
