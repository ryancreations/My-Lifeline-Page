<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mental Tools • My Lifeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #00bcd4;
      --accent: #ff9ff3;
      --bg-light: linear-gradient(135deg, #fff8f0 0%, #e0f7ff 100%);
      --card: #ffffff;
      --text: #2c3e50;
      --shadow: rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --bg-light: linear-gradient(135deg, #0f1c2e 0%, #2c1e3a 100%);
      --card: #2c3e50;
      --text: #e0f2f1;
      --primary: #4fc3f7;
      --accent: #ff79c6;
      --shadow: rgba(0,0,0,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg-light);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.6s;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(135, 206, 235, 0.97);
      backdrop-filter: blur(12px);
      z-index: 1000;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 6px 20px var(--shadow);
    }
    [data-theme="dark"] nav { background: rgba(26, 38, 57, 0.97); }

    main { max-width: 1000px; margin: 100px auto 60px; padding: 0 20px; }

    header {
      text-align: center;
      background: var(--primary);
      color: white;
      padding: 60px 30px;
      border-radius: 28px;
      margin-bottom: 40px;
    }

    .section {
      background: var(--card);
      border-radius: 22px;
      padding: 32px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px var(--shadow);
    }

    .journal-entry {
      background: rgba(0,188,212,0.08);
      padding: 16px;
      border-radius: 12px;
      margin: 12px 0;
      position: relative;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .floating-bestie {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 78px;
      height: 78px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      box-shadow: 0 12px 35px rgba(255,159,243,0.55);
      cursor: pointer;
      z-index: 999;
    }
  </style>
</head>
<body data-theme="light">

  <nav>
    <div style="font-size:1.6rem;font-weight:700;display:flex;align-items:center;gap:10px;"><span>🫂</span> My Lifeline</div>
    <button onclick="location.href='index.html'" style="background:white;color:#00bcd4;border:none;padding:10px 20px;border-radius:30px;">← Dashboard</button>
  </nav>

  <div class="floating-bestie" onclick="location.href='bestie.html'">🫂</div>

  <main>
    <header>
      <h1>🧠 Mental Tools</h1>
      <p>Coping skills, check-ins, and gentle support</p>
    </header>

    <div class="section">
      <h2>Quick Mood Check-in</h2>
      <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
        <button onclick="logMood('Great 😊')" style="padding:12px 24px;border-radius:999px;background:#a3e4a3;border:none;cursor:pointer;">Great</button>
        <button onclick="logMood('Okay 🙂')" style="padding:12px 24px;border-radius:999px;background:#ffe066;border:none;cursor:pointer;">Okay</button>
        <button onclick="logMood('Rough 😔')" style="padding:12px 24px;border-radius:999px;background:#ff9999;border:none;cursor:pointer;">Rough</button>
      </div>
    </div>

    <div class="section">
      <h2>Mood Journal (Saved)</h2>
      <input type="text" id="moodNote" placeholder="How are you feeling? Write anything..." style="width:100%;padding:14px;border-radius:12px;border:2px solid var(--primary);margin-bottom:12px;">
      <button onclick="saveMoodEntry()" style="width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:16px;">Save Entry</button>
      <div id="moodHistory" style="margin-top:20px;"></div>
    </div>

    <div class="section">
      <h2>Therapy Prep Notes</h2>
      <textarea id="therapyNote" placeholder="What do you want to talk about in therapy?" style="width:100%;height:120px;padding:14px;border-radius:12px;border:2px solid var(--primary);"></textarea>
      <button onclick="saveTherapyNote()" style="width:100%;margin-top:12px;padding:14px;background:var(--primary);color:white;border:none;border-radius:16px;">Save Note</button>
      <div id="therapyHistory" style="margin-top:20px;"></div>
    </div>
  </main>

  <script>
    if (localStorage.getItem('lifeline-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    // Mood Journal
    let moodEntries = JSON.parse(localStorage.getItem('moodEntries') || '[]');
    function saveMoodEntry() {
      const note = document.getElementById('moodNote').value.trim();
      if (note) {
        moodEntries.unshift({date: new Date().toLocaleString(), note});
        localStorage.setItem('moodEntries', JSON.stringify(moodEntries));
        renderMoodHistory();
        document.getElementById('moodNote').value = '';
      }
    }
    function renderMoodHistory() {
      const container = document.getElementById('moodHistory');
      container.innerHTML = moodEntries.map((entry, i) => `
        <div class="journal-entry">
          <small>${entry.date}</small>
          <p>${entry.note}</p>
          <button class="delete-btn" onclick="deleteMoodEntry(${i})">Delete</button>
        </div>
      `).join('');
    }
    function deleteMoodEntry(i) {
      if (confirm("Delete this entry?")) {
        moodEntries.splice(i, 1);
        localStorage.setItem('moodEntries', JSON.stringify(moodEntries));
        renderMoodHistory();
      }
    }

    // Therapy Prep Notes
    let therapyEntries = JSON.parse(localStorage.getItem('therapyEntries') || '[]');
    function saveTherapyNote() {
      const note = document.getElementById('therapyNote').value.trim();
      if (note) {
        therapyEntries.unshift({date: new Date().toLocaleString(), note});
        localStorage.setItem('therapyEntries', JSON.stringify(therapyEntries));
        renderTherapyHistory();
        document.getElementById('therapyNote').value = '';
      }
    }
    function renderTherapyHistory() {
      const container = document.getElementById('therapyHistory');
      container.innerHTML = therapyEntries.map((entry, i) => `
        <div class="journal-entry">
          <small>${entry.date}</small>
          <p>${entry.note}</p>
          <button class="delete-btn" onclick="deleteTherapyEntry(${i})">Delete</button>
        </div>
      `).join('');
    }
    function deleteTherapyEntry(i) {
      if (confirm("Delete this note?")) {
        therapyEntries.splice(i, 1);
        localStorage.setItem('therapyEntries', JSON.stringify(therapyEntries));
        renderTherapyHistory();
      }
    }

    function logMood(mood) {
      alert(`Mood logged: ${mood}. You're doing great.`);
    }

    // Init
    renderMoodHistory();
    renderTherapyHistory();
  </script>
</body>
</html>
