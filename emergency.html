<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency • My Lifeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #00bcd4;
      --accent: #ff9ff3;
      --bg-light: linear-gradient(135deg, #fff8f0 0%, #e0f7ff 100%);
      --card: #ffffff;
      --text: #2c3e50;
      --shadow: rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --bg-light: linear-gradient(135deg, #0f1c2e 0%, #2c1e3a 100%);
      --card: #2c3e50;
      --text: #e0f2f1;
      --primary: #4fc3f7;
      --accent: #ff79c6;
      --shadow: rgba(0,0,0,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg-light);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.6s;
    }

    nav { position:fixed; top:0; left:0; right:0; background:rgba(135,206,235,0.97); backdrop-filter:blur(12px); z-index:1000; padding:14px 20px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 6px 20px var(--shadow); }
    [data-theme="dark"] nav { background:rgba(26,38,57,0.97); }

    .logo { font-size:1.6rem; font-weight:700; display:flex; align-items:center; gap:10px; }
    .nav-btn { background:white; color:var(--primary); border:none; padding:10px 18px; border-radius:30px; font-weight:600; cursor:pointer; }

    main { max-width:900px; margin:100px auto 60px; padding:0 20px; }
    header { text-align:center; background:linear-gradient(135deg,#e74c3c,#ff6b6b); color:white; padding:60px 30px; border-radius:28px; margin-bottom:40px; }

    .section { background:var(--card); border-radius:22px; padding:32px; margin-bottom:30px; box-shadow:0 10px 30px var(--shadow); }

    .emergency-btn {
      display:block; width:100%; padding:18px; margin:12px 0;
      background:#e74c3c; color:white; border:none; border-radius:16px;
      font-size:1.25rem; cursor:pointer; transition:all 0.3s;
    }
    .emergency-btn:hover { transform:scale(1.03); }

    .timer {
      font-size: 2.4rem;
      font-weight: 700;
      text-align: center;
      margin: 30px 0;
      min-height: 80px;
      color: var(--primary);
    }

    .floating-bestie {
      position:fixed; bottom:30px; right:30px; width:78px; height:78px;
      background:var(--accent); border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-size:2.8rem; box-shadow:0 12px 35px rgba(255,159,243,0.55);
      cursor:pointer; z-index:999;
    }
  </style>
</head>
<body data-theme="light">

  <nav>
    <div class="logo"><span>🫂</span> My Lifeline</div>
    <button class="nav-btn" onclick="location.href='index.html'">← Dashboard</button>
  </nav>

  <div class="floating-bestie" onclick="location.href='bestie.html'">🫂</div>

  <main>
    <header>
      <h1>🚨 You Are Not Alone</h1>
      <p>Help is here right now.</p>
    </header>

    <div class="section">
      <h2>📞 Crisis Lines</h2>
      <a href="tel:988" class="emergency-btn">📱 Call/Text 988</a>
      <a href="tel:911" class="emergency-btn">🚨 Call 911</a>
    </div>

    <div class="section">
      <h2>❤️ Personal Anchors</h2>
      <div id="anchorsList"></div>
      <input type="text" id="newName" placeholder="Name" style="width:48%;padding:12px;margin-right:4%;">
      <input type="tel" id="newPhone" placeholder="Phone" style="width:48%;padding:12px;">
      <button onclick="addAnchor()" style="width:100%;margin-top:10px;padding:14px;background:var(--primary);color:white;border:none;border-radius:16px;">+ Add Anchor</button>
    </div>

    <div class="section">
      <h2>🫁 Guided Breathing (4-4-6)</h2>
      <div id="breathTimer" class="timer">Press Start</div>
      <button onclick="startBreathing()" class="emergency-btn" style="background:#00bcd4;">Start Exercise</button>
      <button onclick="resetBreathing()" style="background:none;border:none;color:#777;margin-top:10px;cursor:pointer;">Reset</button>
    </div>

    <div class="section">
      <h2>🌱 5-4-3-2-1 Grounding</h2>
      <div id="groundingSteps"></div>
      <button onclick="startGrounding()" class="emergency-btn" style="background:#00bcd4;">Begin Grounding</button>
    </div>
  </main>

  <script>
    if (localStorage.getItem('lifeline-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

    // Personal Anchors
    let anchors = JSON.parse(localStorage.getItem('personalAnchors') || '[]');
    function renderAnchors() {
      const list = document.getElementById('anchorsList');
      list.innerHTML = anchors.map((a,i) => `
        <div style="background:rgba(0,188,212,0.1);padding:12px;border-radius:12px;margin:8px 0;display:flex;justify-content:space-between;">
          <div><strong>${a.name}</strong><br>${a.phone}</div>
          <button onclick="removeAnchor(${i})" style="background:none;border:none;color:#e74c3c;">✕</button>
        </div>
      `).join('');
    }
    function addAnchor() {
      const name = document.getElementById('newName').value.trim();
      const phone = document.getElementById('newPhone').value.trim();
      if (name) {
        anchors.push({name, phone: phone || '—'});
        localStorage.setItem('personalAnchors', JSON.stringify(anchors));
        renderAnchors();
        document.getElementById('newName').value = '';
        document.getElementById('newPhone').value = '';
      }
    }
    function removeAnchor(i) {
      if (confirm("Remove this anchor?")) {
        anchors.splice(i,1);
        localStorage.setItem('personalAnchors', JSON.stringify(anchors));
        renderAnchors();
      }
    }
    renderAnchors();

    // Fixed Guided Breathing
    let breathInterval = null;
    function startBreathing() {
      resetBreathing();
      const timerEl = document.getElementById('breathTimer');
      const sequence = [
        {action: "Inhale", secs: 4},
        {action: "Hold", secs: 4},
        {action: "Exhale", secs: 6}
      ];
      let step = 0;
      let count = sequence[step].secs;

      const update = () => {
        timerEl.textContent = `${sequence[step].action}... ${count}`;
        count--;
        if (count < 0) {
          step = (step + 1) % sequence.length;
          count = sequence[step].secs;
        }
      };

      update();
      breathInterval = setInterval(update, 1000);
    }

    function resetBreathing() {
      if (breathInterval) clearInterval(breathInterval);
      document.getElementById('breathTimer').textContent = "Press Start";
    }

    // 5-4-3-2-1 Grounding
    function startGrounding() {
      const container = document.getElementById('groundingSteps');
      const steps = [
        {n:5, label:"things you can SEE right now"},
        {n:4, label:"things you can TOUCH"},
        {n:3, label:"things you can HEAR"},
        {n:2, label:"things you can SMELL"},
        {n:1, label:"thing you can TASTE"}
      ];

      let html = `<p style="margin-bottom:20px;">Take your time with each step.</p>`;
      steps.forEach(s => {
        html += `
          <div style="margin:18px 0;">
            <strong>${s.n} ${s.label}</strong>
            <input type="text" class="input-box" placeholder="Write one or more..." style="width:100%;padding:12px;margin-top:6px;border:2px solid var(--primary);border-radius:12px;">
          </div>
        `;
      });
      html += `<button onclick="finishGrounding()" style="width:100%;padding:16px;background:#27ae60;color:white;border:none;border-radius:16px;margin-top:20px;">I feel more present</button>`;
      container.innerHTML = html;
    }

    function finishGrounding() {
      alert("You're doing amazing. Come back anytime you need this space ❤️");
      document.getElementById('groundingSteps').innerHTML = '';
    }
  </script>
</body>
</html>
