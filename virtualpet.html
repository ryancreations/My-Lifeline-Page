<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Virtual Pet • My Lifeline</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

/* =========================
MY LIFELINE THEME
========================= */


:root{

--primary:#00bcd4;

--accent:#ff9ff3;

--background:
linear-gradient(135deg,#fff8f0,#e0f7ff);

--card:#ffffff;

--text:#2c3e50;

--shadow:
rgba(0,0,0,.12);

}



[data-theme="dark"]{

--background:
linear-gradient(135deg,#0f1c2e,#2c1e3a);

--card:#2c3e50;

--text:#e0f2f1;

--primary:#4fc3f7;

--accent:#ff79c6;

--shadow:
rgba(0,0,0,.45);

}




*{

margin:0;

padding:0;

box-sizing:border-box;

}




body{

font-family:
'Quicksand',
sans-serif;

background:
var(--background);

color:
var(--text);

min-height:100vh;

transition:.5s;

}





/* =========================
NAVIGATION
========================= */


nav{

position:fixed;

top:0;

left:0;

right:0;

background:
rgba(135,206,235,.97);

padding:14px 20px;

display:flex;

justify-content:center;

gap:12px;

flex-wrap:wrap;

z-index:1000;

box-shadow:
0 6px 20px var(--shadow);

}



[data-theme="dark"] nav{

background:
rgba(26,38,57,.97);

}



.nav-btn{

background:white;

color:var(--primary);

border:none;

padding:10px 18px;

border-radius:30px;

font-weight:600;

cursor:pointer;

transition:.3s;

}



.nav-btn:hover{

transform:
translateY(-3px);

}







/* =========================
MAIN
========================= */


main{

max-width:900px;

margin:
100px auto 50px;

padding:
0 20px;

}





header{

background:
linear-gradient(
135deg,
var(--primary),
#81d4fa
);

color:white;

padding:
55px 30px;

border-radius:28px;

text-align:center;

box-shadow:
0 15px 40px var(--shadow);

}



header h1{

font-size:2.6rem;

margin-bottom:12px;

}





/* =========================
CARDS
========================= */


.card{

background:
var(--card);

border-radius:22px;

padding:30px;

margin-top:25px;

box-shadow:
0 10px 30px var(--shadow);

text-align:center;

}





/* =========================
BUTTONS
========================= */


.main-btn{

background:
var(--primary);

color:white;

border:none;

padding:
14px 30px;

border-radius:50px;

font-size:1.1rem;

cursor:pointer;

margin:8px;

transition:.3s;

}



.main-btn:hover{

transform:
scale(1.05);

}





/* =========================
LOGIN
========================= */


#loginScreen{

position:fixed;

inset:0;

background:
var(--background);

z-index:9999;

}



.login-box{

position:absolute;

top:50%;

left:50%;

transform:
translate(-50%,-50%);

background:
var(--card);

padding:45px 30px;

width:90%;

max-width:420px;

border-radius:25px;

text-align:center;

box-shadow:
0 20px 50px var(--shadow);

}



.login-box h1{

font-size:3rem;

color:
var(--primary);

}



.login-box input{

width:100%;

padding:15px;

margin:10px 0;

border-radius:12px;

border:
2px solid #87ceeb;

font-size:1rem;

}



.hidden{

display:none;

}



</style>

</head>


<body data-theme="light">



<!-- NAVIGATION -->


<nav>


<button class="nav-btn"
onclick="location.href='index.html'">

🏠 Dashboard

</button>



<button class="nav-btn"
onclick="location.href='bestie.html'">

🫂 Bestie

</button>



<button class="nav-btn"
onclick="location.href='letters.html'">

💌 Letters

</button>



<button class="nav-btn"
onclick="toggleDarkMode()">

🌗 Theme

</button>



</nav><!-- LOGIN SCREEN -->


<div id="loginScreen">


<div class="login-box">


<h1>
🐶 My Lifeline
</h1>


<p>
Enter your personal key
</p>



<input
id="username"
placeholder="Username">



<input
id="password"
type="password"
placeholder="Password">



<button class="main-btn"
onclick="checkLogin()">

Enter Safe Space

</button>


</div>


</div>







<!-- MAIN CONTENT -->


<div id="mainContent" class="hidden">


<main>



<header>


<h1>
🐾 Virtual Pet
</h1>


<p>
Take care of your little Lifeline companion.
</p>


</header>









<section class="card">


<h2 style="
color:var(--primary);
">

Meet Your Friend

</h2>



<div style="
font-size:6rem;
margin:20px;
"
id="petEmoji">

🐶

</div>




<h2 id="petName">

Max

</h2>




<p id="petMood">

😊 Happy

</p>



<input
id="nameInput"
placeholder="Pet name..."
style="
padding:12px;
border-radius:15px;
border:2px solid #87ceeb;
font-family:inherit;
margin-top:15px;
">



<button class="main-btn"
onclick="changeName()">

✏️ Rename

</button>



</section>









<section class="card">


<h2 style="
color:var(--primary);
">

📊 Pet Stats

</h2>




<p>
🍖 Hunger
</p>


<div style="
background:#ddd;
height:20px;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
">

<div id="hungerBar"
style="
height:100%;
width:80%;
background:var(--primary);
">
</div>

</div>





<p>
❤️ Happiness
</p>


<div style="
background:#ddd;
height:20px;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
">

<div id="happyBar"
style="
height:100%;
width:80%;
background:var(--accent);
">
</div>

</div>






<p>
⚡ Energy
</p>


<div style="
background:#ddd;
height:20px;
border-radius:20px;
overflow:hidden;
">

<div id="energyBar"
style="
height:100%;
width:80%;
background:#81d4fa;
">
</div>

</div>



</section>









<section class="card">


<h2 style="
color:var(--primary);
">

🐾 Spend Time Together

</h2>




<button class="main-btn"
onclick="feedPet()">

🍖 Feed

</button>




<button class="main-btn"
onclick="playPet()">

🎾 Play

</button>




<button class="main-btn"
onclick="cuddlePet()">

🫂 Cuddle

</button>



</section>









<section class="card">


<h2 style="
color:var(--primary);
">

💙 Pet Message

</h2>



<p id="petMessage">

Your pet is happy you are here.

</p>



</section>





</main>


</div><script>


// =========================
// THEME SYNC
// =========================


function toggleDarkMode(){


const current =
document.documentElement.getAttribute(
"data-theme"
);



const newTheme =
current==="dark"
?
"light"
:
"dark";



document.documentElement.setAttribute(
"data-theme",
newTheme
);



localStorage.setItem(
"lifeline-theme",
newTheme
);


}




if(
localStorage.getItem("lifeline-theme")
==="dark"
){

document.documentElement.setAttribute(
"data-theme",
"dark"
);

}









// =========================
// LOGIN
// =========================


function checkLogin(){


const user =
document.getElementById("username")
.value
.trim()
.toLowerCase();



const pass =
document.getElementById("password")
.value
.trim();



if(

(user==="ryan" && pass==="ITSmf420") ||

(user==="guest" && pass==="guest") ||

(user==="visitor" && pass==="welcome") ||

(user==="friend" && pass==="lifeline") ||

(user==="nc" && pass==="boone")

){


localStorage.setItem(
"lifelineAuthenticated",
"true"
);



document
.getElementById("loginScreen")
.classList.add("hidden");



document
.getElementById("mainContent")
.classList.remove("hidden");



loadPet();


}


else{


alert(
"Incorrect username or password."
);


}


}







if(

localStorage.getItem(
"lifelineAuthenticated"
)
==="true"

){


document
.getElementById("loginScreen")
.classList.add("hidden");



document
.getElementById("mainContent")
.classList.remove("hidden");



}










// =========================
// PET DATA
// =========================



let pet = JSON.parse(

localStorage.getItem(
"lifelinePet"
)

||

`{
"name":"Max",
"hunger":80,
"happy":80,
"energy":80
}`

);








function savePet(){


localStorage.setItem(

"lifelinePet",

JSON.stringify(pet)

);


}









function loadPet(){


document.getElementById(
"petName"
)
.innerHTML =
pet.name;



updatePet();


}









function updatePet(){


document.getElementById(
"hungerBar"
)
.style.width =
pet.hunger+"%";



document.getElementById(
"happyBar"
)
.style.width =
pet.happy+"%";



document.getElementById(
"energyBar"
)
.style.width =
pet.energy+"%";



document.getElementById(
"petName"
)
.innerHTML =
pet.name;



let mood;



if(pet.happy>70){

mood="😊 Happy";

}

else if(pet.happy>40){

mood="🙂 Okay";

}

else{

mood="🥺 Needs attention";

}



document.getElementById(
"petMood"
)
.innerHTML =
mood;



savePet();


}









// =========================
// RENAME PET
// =========================


function changeName(){


const name =
document.getElementById(
"nameInput"
)
.value.trim();



if(name){


pet.name=name;


document.getElementById(
"nameInput"
)
.value="";



document.getElementById(
"petMessage"
)
.innerHTML =
"Your pet loves their new name 💙";



updatePet();


}


}









// =========================
// PET ACTIONS
// =========================


function feedPet(){


pet.hunger =
Math.min(
100,
pet.hunger+20
);



pet.happy =
Math.min(
100,
pet.happy+5
);



document.getElementById(
"petMessage"
)
.innerHTML =
"🍖 Your pet enjoyed the food!";



updatePet();


}








function playPet(){


if(pet.energy<15){


document.getElementById(
"petMessage"
)
.innerHTML =
"😴 Your pet needs rest first.";

return;

}




pet.happy =
Math.min(
100,
pet.happy+15
);



pet.energy =
Math.max(
0,
pet.energy-15
);



pet.hunger =
Math.max(
0,
pet.hunger-5
);



document.getElementById(
"petMessage"
)
.innerHTML =
"🎾 Your pet had fun playing!";



updatePet();


}








function cuddlePet(){


pet.happy =
Math.min(
100,
pet.happy+10
);



pet.energy =
Math.min(
100,
pet.energy+5
);



document.getElementById(
"petMessage"
)
.innerHTML =
"🫂 Your pet feels loved.";





updatePet();


}









// =========================
// PET NATURAL DECAY
// =========================


setInterval(()=>{


if(
!document
.getElementById("mainContent")
.classList.contains("hidden")
){


pet.hunger =
Math.max(
0,
pet.hunger-1
);



pet.energy =
Math.max(
0,
pet.energy-1
);



updatePet();


}


},60000);






loadPet();


</script>
