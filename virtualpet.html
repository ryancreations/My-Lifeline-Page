<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Virtual Pet • My Lifeline</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{

--primary:#00bcd4;
--pink:#ff6b9d;
--green:#a8e6cf;
--bg:linear-gradient(135deg,#eefcff,#ffeaf3);
--card:white;
--text:#333;
--box:#f7f7ff;

}



body.dark-mode{

--bg:linear-gradient(135deg,#101c33,#2c1e3a);
--card:#263545;
--text:#eee;
--box:#34495e;

}



*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

font-family:'Quicksand',sans-serif;

background:var(--bg);

color:var(--text);

min-height:100vh;

transition:.3s;

}




/* Navigation */

nav{

position:fixed;

top:0;

left:0;

width:100%;

background:#87ceeb;

padding:12px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:12px;

z-index:1000;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}



.nav-btn{

background:white;

color:#00bcd4;

border:none;

padding:10px 18px;

border-radius:30px;

font-weight:600;

cursor:pointer;

}




body.dark-mode nav{

background:#1e3a5f;

}





/* Floating Bestie */

.bestie{

position:fixed;

right:25px;

bottom:25px;

width:75px;

height:75px;

background:#ff9ff3;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:2.5rem;

cursor:pointer;

box-shadow:0 10px 30px rgba(255,159,243,.5);

z-index:9999;

}




main{

padding:110px 20px 50px;

max-width:900px;

margin:auto;

}




.hero{

background:linear-gradient(135deg,#00bcd4,#a8e6cf);

padding:40px 20px;

border-radius:30px;

color:white;

text-align:center;

margin-bottom:30px;

}



.hero h1{

font-size:2.7rem;

margin-bottom:10px;

}




.card{

background:var(--card);

padding:30px;

border-radius:25px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

margin-bottom:25px;

text-align:center;

}





.pet{

font-size:120px;

margin:20px;

transition:.3s;

}



.pet:hover{

transform:scale(1.1);

}





.status{

background:var(--box);

padding:20px;

border-radius:20px;

font-size:1.2rem;

line-height:1.8;

}





button.action{

margin:10px;

padding:14px 30px;

border:none;

border-radius:50px;

background:#ff6b9d;

color:white;

font-size:1.1rem;

font-weight:600;

cursor:pointer;

}




button.action:hover{

transform:scale(1.05);

}





</style>

</head>


<body>


<nav>

<button class="nav-btn" onclick="location.href='index.html'">
🏠 Dashboard
</button>

<button class="nav-btn" onclick="location.href='bestie.html'">
🫂 Bestie
</button>

<button class="nav-btn" onclick="location.href='pet.html'">
🐶 Pet
</button>

<button class="nav-btn" onclick="toggleDarkMode()">
🌙 Dark Mode
</button>

</nav>



<div class="bestie" onclick="location.href='bestie.html'">
🫂
</div><main>


<section class="hero">

<h1>🐶 My Lifeline Pet</h1>

<p>
Your little companion is here whenever you need a friend.
</p>

</section>



<section class="card">


<div id="pet" class="pet">
🐶
</div>



<div class="status">

<p>
❤️ Happiness: <span id="happy">50</span>/100
</p>


<p>
🍖 Hunger: <span id="hunger">50</span>/100
</p>


<p>
⚡ Energy: <span id="energy">50</span>/100
</p>


<p>
😊 Mood: <span id="mood">Happy</span>
</p>


</div>


<br>


<button class="action" onclick="feedPet()">

🍖 Feed

</button>



<button class="action" onclick="playPet()">

🎾 Play

</button>



<button class="action" onclick="comfortPet()">

🫂 Comfort

</button>



<button class="action" onclick="restPet()">

😴 Rest

</button>



</section>




<section class="card">


<h2>
💙 Your Pet Message
</h2>


<p id="message">

Your pet is happy you are here.

</p>


</section>



</main><script>


// Pet Data

let petData = JSON.parse(
localStorage.getItem("lifelinePet")
) || {

happiness:50,
hunger:50,
energy:50,
mood:"Happy"

};




function updatePet(){


document.getElementById("happy").textContent =
petData.happiness;


document.getElementById("hunger").textContent =
petData.hunger;


document.getElementById("energy").textContent =
petData.energy;


document.getElementById("mood").textContent =
petData.mood;



localStorage.setItem(
"lifelinePet",
JSON.stringify(petData)
);


}



function setMessage(text){

document.getElementById("message").textContent=text;

}




function feedPet(){


petData.hunger =
Math.min(100, petData.hunger + 20);


petData.happiness =
Math.min(100, petData.happiness + 5);


petData.mood="Full & Happy";


setMessage(
"Your pet enjoyed the snack! 🍖"
);


updatePet();

}




function playPet(){


if(petData.energy < 10){

setMessage(
"Your pet is tired. Let them rest first 😴"
);

return;

}



petData.energy -=10;


petData.happiness =
Math.min(100, petData.happiness + 15);


petData.hunger =
Math.min(100, petData.hunger + 5);


petData.mood="Excited";


setMessage(
"Your pet had fun playing with you! 🎾"
);


updatePet();


}




function comfortPet(){


petData.happiness =
Math.min(100, petData.happiness + 10);


petData.mood="Loved";


setMessage(
"Your pet feels safe with you. 🫂"
);


updatePet();


}




function restPet(){


petData.energy =
Math.min(100, petData.energy + 20);


petData.mood="Relaxed";


setMessage(
"Your pet is resting and feeling better. 🌙"
);


updatePet();


}





// Dark Mode

function toggleDarkMode(){


document.body.classList.toggle(
"dark-mode"
);


localStorage.setItem(
"darkMode",
document.body.classList.contains("dark-mode")
);


}




if(localStorage.getItem("darkMode")==="true"){

document.body.classList.add(
"dark-mode"
);

}




updatePet();



</script>


</body>

</html>
