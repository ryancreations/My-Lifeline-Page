<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Reframe • My Lifeline</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

:root{

 --primary:#00bcd4;
 --pink:#ff6b9d;
 --purple:#9b59b6;
 --bg:linear-gradient(135deg,#d1f0ff,#ffe6f2);
 --card:white;
 --text:#333;
 --box:#f8f9fa;
 --shadow:rgba(0,0,0,.15);

}



[data-theme="dark"]{

 --bg:linear-gradient(135deg,#101c33,#2c1e3a);
 --card:#263545;
 --text:#eee;
 --box:#34495e;
 --shadow:rgba(0,0,0,.4);

}



*{

 margin:0;
 padding:0;
 box-sizing:border-box;

}



body{

 font-family:'Quicksand',sans-serif;

 background:var(--bg);

 color:var(--text);

 min-height:100vh;

 transition:.4s;

}




/* Navigation */

nav{

 position:fixed;

 top:0;

 left:0;

 width:100%;


 background:rgba(135,206,235,.95);

 padding:12px;


 display:flex;

 justify-content:center;

 flex-wrap:wrap;

 gap:12px;


 z-index:1000;


 box-shadow:0 5px 20px var(--shadow);

}



[data-theme="dark"] nav{

 background:rgba(25,40,60,.95);

}



.nav-btn{

 background:white;

 color:var(--primary);

 border:none;

 padding:10px 18px;

 border-radius:30px;

 font-weight:600;

 cursor:pointer;

 transition:.3s;

}


.nav-btn:hover{

 transform:translateY(-2px);

}




/* Floating Bestie */

.bestie-float{

 position:fixed;

 right:25px;

 bottom:25px;


 width:75px;

 height:75px;


 background:#ff9ff3;

 border-radius:50%;


 display:flex;

 justify-content:center;

 align-items:center;


 font-size:2.5rem;


 cursor:pointer;


 z-index:9999;


 box-shadow:0 10px 30px rgba(255,159,243,.5);

}




/* Main */

main{

 max-width:900px;

 margin:auto;

 padding:110px 20px 60px;

}



.hero{

 text-align:center;

 background:linear-gradient(135deg,#00bcd4,#9b59b6);

 color:white;

 padding:45px 25px;

 border-radius:30px;

 margin-bottom:35px;


 box-shadow:0 15px 40px rgba(0,188,212,.3);

}



.hero h1{

 font-size:2.6rem;

 margin-bottom:12px;

}




.card{

 background:var(--card);

 padding:30px;

 border-radius:25px;

 margin-bottom:25px;

 box-shadow:0 10px 30px var(--shadow);

}



label{

 display:block;

 font-weight:700;

 margin-bottom:12px;

 font-size:1.1rem;

}



textarea{

 width:100%;

 min-height:140px;

 border-radius:18px;

 border:2px solid #87ceeb;

 padding:18px;

 font-family:'Quicksand',sans-serif;

 font-size:1.05rem;

 resize:none;

}



select{

 width:100%;

 padding:15px;

 border-radius:15px;

 border:2px solid #87ceeb;

 font-family:'Quicksand',sans-serif;

 font-size:1rem;

}




.action-btn{

 display:block;

 margin:25px auto;

 padding:16px 38px;


 background:var(--pink);

 color:white;

 border:none;

 border-radius:50px;


 font-size:1.2rem;

 font-weight:700;


 cursor:pointer;

 transition:.3s;

}



.action-btn:hover{

 transform:scale(1.05);

}




.output{

 background:var(--box);

 padding:22px;

 border-radius:18px;

 line-height:1.7;

}



.history-item{

 background:var(--box);

 padding:20px;

 border-radius:18px;

 margin-top:15px;

}



.delete-btn{

 background:#ff6b6b;

 color:white;

 border:none;

 border-radius:20px;

 padding:7px 14px;

 cursor:pointer;

 margin-top:12px;

}



@media(max-width:600px){

 .hero h1{

  font-size:2rem;

 }

}


</style>

</head>


<body data-theme="light">


<nav>

<button class="nav-btn" onclick="location.href='index.html'">
🏠 Dashboard
</button>


<button class="nav-btn" onclick="location.href='bestie.html'">
🫂 Bestie
</button>


<button class="nav-btn" onclick="location.href='pet.html'">
🐶 Pet
</button>


<button class="nav-btn" onclick="toggleDarkMode()">
🌙
</button>


</nav>


<div class="bestie-float" onclick="location.href='bestie.html'">
🫂
</div><main>


<section class="hero">

<h1>🧠 AI Reframe</h1>

<p>
Turn painful thoughts into a more balanced perspective.
</p>

</section>




<section class="card">

<label>
💭 What thought is hurting right now?
</label>


<textarea 
id="thought"
placeholder="Write the thought that's weighing on you...">
</textarea>


</section>




<section class="card">

<label>
🌊 How intense does it feel?
</label>


<select id="intensity">

<option value="low">
Low but lingering
</option>

<option value="medium">
Heavy and distracting
</option>

<option value="high">
Overwhelming / spiraling
</option>

</select>


</section>




<section class="card">

<label>
💙 What kind of support would help?
</label>


<select id="style">

<option value="gentle">
Gentle & comforting
</option>


<option value="realistic">
Grounded & realistic
</option>


<option value="firm">
Firm but caring
</option>


</select>


</section>




<button class="action-btn" onclick="generateReframe()">

✨ Reframe Thought

</button>





<section class="card" id="result" style="display:none;">


<h2>
🌱 Your Reframe
</h2>


<div class="output" id="output">

</div>


</section>





<section class="card">

<h2>
📖 Past Reframes
</h2>


<p>
Saved privately on this device.
</p>


<div id="history">

</div>


</section>



</main>



<footer style="text-align:center;padding:30px;opacity:.7;">
My Lifeline • A different way to look at the moment 💙
</footer><script>


// Dark Mode

function toggleDarkMode(){

 const current =
 document.documentElement.getAttribute("data-theme");


 const next =
 current === "dark" ? "light" : "dark";


 document.documentElement.setAttribute(
  "data-theme",
  next
 );


 localStorage.setItem(
  "lifeline-theme",
  next
 );

}



if(localStorage.getItem("lifeline-theme")==="dark"){

 document.documentElement.setAttribute(
  "data-theme",
  "dark"
 );

}





// Reframe History

let reframes =
JSON.parse(
 localStorage.getItem("lifelineReframes") || "[]"
);



const historyBox =
document.getElementById("history");



function generateReframe(){


 const thought =
 document.getElementById("thought").value.trim();


 const intensity =
 document.getElementById("intensity").value;


 const style =
 document.getElementById("style").value;



 if(!thought){

  alert("Write the thought first 💙");

  return;

 }



 let opening="";
 let middle="";
 let closing="";



 if(style==="gentle"){

  opening =
  "I hear how heavy this feels. A painful thought can feel completely true when emotions are strong.";


  middle =
  "This thought may be coming from hurt, fear, or exhaustion. Having this thought does not mean it is a fact.";


  closing =
  "You deserve the same kindness you would give someone else who was struggling.";

 }



 if(style==="realistic"){

  opening =
  "Let's look at this thought from a calmer angle.";


  middle =
  "Feelings are important, but they are not always accurate evidence. There may be more than one way to understand this situation.";


  closing =
  "One difficult moment does not define your entire story.";

 }



 if(style==="firm"){

  opening =
  "This thought is loud, but loud does not mean true.";


  middle =
  "Your brain may be trying to protect you while you're hurting. You can acknowledge the pain without accepting every negative thought as reality.";


  closing =
  "You are allowed to challenge thoughts that make you feel hopeless.";

 }



 if(intensity==="high"){

  middle +=
  " When emotions are intense, slowing down before believing a thought can help.";

 }



 const reframe = `

 <p>${opening}</p>

 <p><strong>Original thought:</strong><br>
 ${escapeHTML(thought)}
 </p>


 <p>${middle}</p>


 <p><strong>New perspective:</strong><br>
 "I am having a hard moment, but this moment does not define my worth or my future."
 </p>


 <p>${closing}</p>

 `;



 document.getElementById("output").innerHTML =
 reframe;



 document.getElementById("result").style.display =
 "block";



 const saved = {

  thought:thought,

  text:reframe,

  date:new Date().toLocaleString()

 };


 reframes.unshift(saved);


 localStorage.setItem(
  "lifelineReframes",
  JSON.stringify(reframes)
 );


 displayHistory();


}




function escapeHTML(text){

 return text
 .replace(/&/g,"&amp;")
 .replace(/</g,"&lt;")
 .replace(/>/g,"&gt;")
 .replace(/"/g,"&quot;")
 .replace(/'/g,"&#039;");

}





function displayHistory(){

 historyBox.innerHTML="";


 reframes.forEach((item,index)=>{


 const div =
 document.createElement("div");


 div.className="history-item";


 div.innerHTML = `

 <small>📅 ${item.date}</small>

 <p><strong>
 Thought:
 </strong><br>
 ${escapeHTML(item.thought)}
 </p>


 <button class="delete-btn"
 onclick="deleteReframe(${index})">
 Delete
 </button>

 `;


 historyBox.appendChild(div);


 });


}




function deleteReframe(index){

 reframes.splice(index,1);


 localStorage.setItem(
  "lifelineReframes",
  JSON.stringify(reframes)
 );


 displayHistory();

}




displayHistory();



</script>


</body>
</html>
