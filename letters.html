<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Letters From Tomorrow • My Lifeline</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Quicksand',sans-serif;
  background:linear-gradient(135deg,#fff8f0,#e0f7ff);
  color:#333;
  min-height:100vh;
  transition:.4s;
}

/* DARK MODE */
body.dark-mode{
  background:linear-gradient(135deg,#1a2639,#2c1e3a);
  color:#eee;
}

body.dark-mode .section,
body.dark-mode .view-toggle,
body.dark-mode .envelope,
body.dark-mode .login-box{
  background:#2c3e50;
  color:white;
}

body.dark-mode textarea,
body.dark-mode input{
  background:#34495e;
  color:white;
}

/* LOGIN */

.login-box{
  background:white;
  padding:45px 30px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  text-align:center;
  max-width:420px;
  width:90%;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:9999;
}

.login-box h1{
  color:#00bcd4;
  font-size:3em;
  margin-bottom:15px;
}

.login-box input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:2px solid #87ceeb;
  border-radius:12px;
  font-size:1em;
}

.login-box button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:50px;
  background:#00bcd4;
  color:white;
  font-size:1.2em;
  cursor:pointer;
}

.hidden{
  display:none;
}


/* NAV */

nav{
  position:fixed;
  top:0;
  width:100%;
  background:#87ceeb;
  padding:10px;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  z-index:1000;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
}

nav button{
  background:white;
  color:#00bcd4;
  border:none;
  padding:10px 18px;
  border-radius:25px;
  font-weight:600;
  cursor:pointer;
}


/* FLOATING BESTIE */

.bestie-orb{
  position:fixed;
  bottom:25px;
  right:25px;
  width:65px;
  height:65px;
  background:#ff9ff3;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  cursor:pointer;
  box-shadow:0 6px 20px rgba(255,159,243,.5);
  z-index:9999;
}


/* MODAL */

#bestieModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  z-index:10000;
  align-items:center;
  justify-content:center;
}

.bestie-window{
  width:90%;
  max-width:800px;
  height:85%;
  background:white;
  border-radius:20px;
  overflow:hidden;
}

.bestie-header{
  background:#87ceeb;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.bestie-window iframe{
  width:100%;
  height:calc(100% - 60px);
  border:none;
}


/* MAIN */

main{
  padding:90px 20px 40px;
  max-width:900px;
  margin:auto;
}

header{
  background:#87ceeb;
  color:white;
  padding:35px;
  border-radius:20px;
  text-align:center;
}

header h1{
  font-size:2.8em;
}


.section,
.view-toggle{
  background:white;
  margin-top:25px;
  padding:25px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,.12);
  text-align:center;
}


.section h2,
.view-toggle h2{
  color:#00bcd4;
  margin-bottom:15px;
}


textarea{
  width:100%;
  height:200px;
  padding:20px;
  border-radius:15px;
  border:2px solid #87ceeb;
  font-family:inherit;
  font-size:1.1em;
}

input[type=date]{
  padding:12px;
  border-radius:10px;
  border:2px solid #87ceeb;
  margin:15px;
}


.action-btn{
  background:#00bcd4;
  color:white;
  border:none;
  padding:14px 30px;
  border-radius:50px;
  cursor:pointer;
  font-size:1.1em;
}


</style>
</head>

<body><!-- TOP NAV -->
<nav>
  <button onclick="location.href='index.html'">🏠 Dashboard</button>
  <button onclick="location.href='bestie.html'">🫂 Bestie</button>
  <button onclick="location.href='pet.html'">🐶 Virtual Pet</button>
  <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
</nav>


<!-- FLOATING BESTIE -->
<div class="bestie-orb" onclick="openBestieModal()">
  🫂
</div>


<!-- BESTIE POPUP -->
<div id="bestieModal">
  <div class="bestie-window">

    <div class="bestie-header">
      <h3>🫂 Talking to Bestie...</h3>
      <button onclick="closeBestieModal()">✕</button>
    </div>

    <iframe src="bestie.html"></iframe>

  </div>
</div>



<!-- LOGIN -->
<div id="loginScreen">

  <div class="login-box">

    <h1>My Lifeline</h1>

    <p>Enter your personal key</p>

    <input 
      type="text" 
      id="username" 
      placeholder="Username">

    <input 
      type="password" 
      id="password" 
      placeholder="Password">

    <button onclick="checkLogin()">
      Enter Safe Space
    </button>

  </div>

</div>



<!-- MAIN CONTENT -->

<div id="mainContent" class="hidden">


<main>


<header>

<h1>💌 Letters From Tomorrow</h1>

<p>
Write something future-you may need to hear someday.
</p>

</header>



<div class="view-toggle">

<h2>View Mode</h2>

<button class="action-btn" onclick="setView('mobile')">
📱 Mobile View
</button>

<button class="action-btn" onclick="setView('desktop')">
💻 Desktop View
</button>

</div>




<div id="dueLetter"></div>




<div class="section">

<h2>
Write a letter to future you
</h2>


<input 
type="date" 
id="deliveryDate">


<textarea 
id="letterText"
placeholder="Hey future me... I want you to remember...">
</textarea>


<br>


<button class="action-btn" onclick="saveLetter()">
💌 Seal & Send
</button>


</div>





<div class="section">

<h2>
Upcoming Letters
</h2>


<div id="upcomingList">
Loading letters...
</div>


</div>


</main>


</div><script>


// DARK MODE

function toggleDarkMode(){

  document.body.classList.toggle("dark-mode");

  localStorage.setItem(
    "darkMode",
    document.body.classList.contains("dark-mode")
  );

}


if(localStorage.getItem("darkMode")==="true"){
  document.body.classList.add("dark-mode");
}



// BESTIE MODAL

function openBestieModal(){

  document.getElementById("bestieModal").style.display="flex";

}


function closeBestieModal(){

  document.getElementById("bestieModal").style.display="none";

}



// LOGIN

function checkLogin(){

  const user =
  document.getElementById("username").value.trim().toLowerCase();

  const pass =
  document.getElementById("password").value.trim();


  if(
    (user==="ryan" && pass==="ITSmf420") ||
    (user==="guest" && pass==="guest") ||
    (user==="visitor" && pass==="welcome") ||
    (user==="friend" && pass==="lifeline") ||
    (user==="nc" && pass==="boone")
  ){

    localStorage.setItem(
      "lifelineAuthenticated",
      "true"
    );

    document
    .getElementById("loginScreen")
    .classList.add("hidden");


    document
    .getElementById("mainContent")
    .classList.remove("hidden");


  }else{

    alert("Incorrect username or password.");

  }

}



function logout(){

  localStorage.removeItem(
    "lifelineAuthenticated"
  );

  location.reload();

}



if(
localStorage.getItem("lifelineAuthenticated")==="true"
){

document
.getElementById("loginScreen")
.classList.add("hidden");


document
.getElementById("mainContent")
.classList.remove("hidden");

}




// VIEW MODE

function setView(mode){

 document.body.classList.remove(
 "mobile-mode",
 "desktop-mode"
 );


 document.body.classList.add(
 mode+"-mode"
 );


 localStorage.setItem(
 "viewMode",
 mode
 );

}



const savedView =
localStorage.getItem("viewMode");


if(savedView){

 setView(savedView);

}




// LETTER SYSTEM


let letters =
JSON.parse(
localStorage.getItem("futureLetters") || "[]"
);




function saveLetter(){


const date =
document.getElementById("deliveryDate").value;


const text =
document.getElementById("letterText").value.trim();



if(!date || !text){

 alert("Add a date and message ❤️");

 return;

}



letters.push({

 date:date,

 text:text,

 sent:new Date().toLocaleDateString()

});



localStorage.setItem(
"futureLetters",
JSON.stringify(letters)
);



document.getElementById("letterText").value="";



alert(
"Letter saved! It will arrive on "
+
date
+
" 💌"
);



showUpcoming();


}





function showUpcoming(){


const list =
document.getElementById("upcomingList");


list.innerHTML="";



const future =
letters.filter(
letter =>
new Date(letter.date) > new Date()
);



if(future.length===0){

list.innerHTML=
"<p>No letters waiting... write one? 💌</p>";

return;

}



future.sort(
(a,b)=>
new Date(a.date)-new Date(b.date)
);



future.forEach(letter=>{


const div =
document.createElement("div");


div.className="section";


div.innerHTML=

`
<strong>
${new Date(letter.date)
.toLocaleDateString(
"en-US",
{
weekday:"long",
year:"numeric",
month:"long",
day:"numeric"
}
)}
</strong>

<br><br>

${letter.text.substring(0,100)}...

`;



list.appendChild(div);



});


}




// OPEN LETTER WHEN DATE ARRIVES


const today =
new Date()
.toISOString()
.split("T")[0];



const arriving =
letters.find(
letter =>
letter.date===today
);



if(arriving){


const envelope =
document.createElement("div");


envelope.className="envelope";


envelope.innerHTML=

`

<h2>
💌 A letter from past-you arrived
</h2>

<p>
Click to open
</p>

`;



envelope.onclick=function(){


envelope.innerHTML=

`

<h2>
From past-you:
</h2>

<p style="
font-size:1.2em;
line-height:1.7;
">

${arriving.text.replace(/\n/g,"<br>")}

</p>

<br>

<p style="
color:#00bcd4;
font-weight:bold;
">

You made it to this day 💙

</p>

`;



};



document
.getElementById("dueLetter")
.appendChild(envelope);



letters =
letters.filter(
l=>l!==arriving
);


localStorage.setItem(
"futureLetters",
JSON.stringify(letters)
);


}



showUpcoming();


</script>


</body>
</html>
